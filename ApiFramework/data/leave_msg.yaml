- title: 发表留言，发表成功
  leave_msg_data: {
    "msg_type": "0",
    "msg_title": "留言",
    "msg_content": "留言",
    "act": "act_add_message",
  }
  expect_val: 留言成功

- title: 发表投诉，发表成功
  leave_msg_data: {
    "msg_type": "1",
    "msg_title": "投诉",
    "msg_content": "投诉",
    "act": "act_add_message",
  }
  expect_val: 留言成功

- title: 发表询问，发表成功
