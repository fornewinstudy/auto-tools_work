- title: 用户名正确，密码正确，登录成功
  json_data: {
      "username": "admin",
      "password": "admin123"
  }
  expect: success

- title: 用户名错误，密码正确，登录失败
  json_data: {
      "username": "admina",
      "password": "admin123"
  }
  expect: error

- title: 用户名正确，密码错误，登录失败
  json_data: {
      "username": "admin",
      "password": "admin1234"
  }
  expect: error

- title: 用户名为空，密码正确，登录失败
  json_data: {
      "username": "",
      "password": "admin123"
  }
  expect: error

- title: 用户名正确，密码为空，登录失败
  json_data: {
      "username": "admin",
      "password": ""
  }
  expect: error