- title: 用户名正确，密码正确，登入成功
  name: 'aaa'
  passwd: "123456"
  expect_val: 登录成功

- title: 用户名错误，密码正确，登入失败
  name: 'aaabbb'
  passwd: "123456"
  expect_val: 用户名或密码错误

- title: 用户名正确，密码错误，登入失败
  name: 'aaa'
  passwd: "1234567"
  expect_val: 用户名或密码错误

- title: 用户名为空，密码正确，登入失败
  name: ''
  passwd: "123456"
  expect_val: 用户名不能为空

- title: 用户名正确，密码为空，登入失败
  name: 'aaa'
  passwd: ""
  expect_val: 密码不能为空